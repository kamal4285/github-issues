<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github all issues tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- tailwind and daisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link - geist -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="navbar flex flex-col sm:flex-row bg-base-100 shadow-sm p-6 space-y-7">
            <div class="flex flex-1 items-center gap-4">
                <img class="h-10" src="assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="🔍 Search issues..." id="search-input" class="input input-bordered w-24 md:w-auto" />
                <div>
                    <button id="search-btn" class="btn btn-primary">Search</button>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="w-5/6 mx-auto my-14">
        <div class="flex flex-col sm:flex-row gap-3 p-4 rounded-lg shadow">
            <button id="all-tab"  class="btn btn-primary tab-btn">All</button>
            <button id="open-tab"  class="btn tab-btn">Open</button>
            <button id="close-tab"  class="btn tab-btn">Close</button>
        </div>

        <div class="top-section p-4 mt-4 flex justify-between items-center shadow">
            <div class="left flex gap-3">
                <img class="flex-1 p-2 bg-[#ECE4FF] rounded-full" src="assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-xl font-semibold"><span id="all-issues">0</span> Issues</h2>
                    <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="right flex gap-3 items-center">
                <i class="fa-solid fa-circle text-green-500"></i>
                <h2>Open</h2>
                <i class="fa-solid fa-circle text-purple-500"></i>
                <h2>Closed</h2>
            </div>
        </div>

        <div id="all-card-section" class="grid grid-cols sm:grid-cols-3 md:grid-cols-4 gap-3 p-4 shadow"> 
            <div id="loadingSpinner" class="h-[60vh] justify-center items-center hidden">
                <span class="loading loading-spinner loading-3xl"></span> 
            </div> 
        </div>

      
<dialog id="my_modal_1" class="modal">
  <div id="modal-box" class="modal-box">
  </div>
</dialog>
    </main>


    <script src="script/script.js"></script>
</body>
</html>
