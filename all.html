<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github all issues tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- tailwind and daisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link - geist -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="navbar bg-base-100 shadow-sm p-6">
            <div class="flex flex-1 items-center gap-4">
                <img class="h-10" src="assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="🔍 Search issues..." class="input input-bordered w-24 md:w-auto" />
                <div>
                    <button class="btn btn-primary">+ New Issues</button>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="w-5/6 mx-auto my-14">
        <div class="flex gap-3 p-4 rounded-lg shadow">
            <button class="btn btn-primary">All</button>
            <button class="btn">Open</button>
            <button class="btn">Close</button>
        </div>

        <div class="flex justify-between items-center shadow mt-3 p-4">
            <div class="left flex gap-3">
                <img class="flex-1 p-2 bg-[#ECE4FF] rounded-full" src="assets/Aperture.png" alt="">
                <div>
                    <h2 class="text-xl font-semibold"><span>50</span> Issues</h2>
                    <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="right flex gap-3 items-center">
                <i class="fa-solid fa-circle text-green-500"></i>
                <h2>Open</h2>
                <i class="fa-solid fa-circle text-purple-500"></i>
                <h2>Closed</h2>
            </div>
        </div>
    </main>

    <script src="script/script.js"></script>
</body>
</html>
