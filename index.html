<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and logo -->
    <title>Github Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- tailwind and daisyUI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font link - geist -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login" class="w-1/3 mx-auto shadow-lg rounded-lg my-12 p-8">
        <div class="logo text-center">
            <img src="assets/github-logo.png" class="mx-auto mb-6" alt="">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-lg text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset my-6">
            <label class="label text-lg text-gray-950">Username</label>
            <input id="username" type="email" class="input w-full" placeholder="Enter Username" />

            <label class="label text-lg text-gray-950">Password</label>
            <input id="password" type="password" class="input w-full" placeholder="Enter password" />

            <button id="login-btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        <div class="flex items-center">
            <hr class="flex-1"><span> or </span><hr class="flex-1">
        </div>
        <div class="text-center">
            <h3 class="text-sm text-[#64748B]">Demo Credentials:</h3>
            <div class="bg-[#F8FAFC] py-8 rounded-lg">
                <p>Username:<span class="text-[#64748B]"> admin </span></p>
                <p>Password:<span class="text-[#64748B]"> admin123 </span></p>
            </div>
        </div>
        
    </div>

    <script src="script/login.js"></script>
</body>
</html>
